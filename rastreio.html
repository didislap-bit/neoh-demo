<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreio Cirúrgico — Hospital Adventista de Belém</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1A2B3C 0%,#2E7FB8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.card-header{background:#2E7FB8;padding:20px 24px;display:flex;align-items:center;gap:14px}
.logo{width:44px;height:44px;background:#F47920;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#fff;flex-shrink:0}
.header-info{color:#fff}
.header-info h1{font-size:16px;font-weight:700;margin-bottom:2px}
.header-info p{font-size:12px;opacity:.8}
.card-body{padding:24px}
.meta-box{background:#EAF3FD;border-radius:10px;padding:16px;margin-bottom:20px;font-size:13px;line-height:2.2}
.meta-box strong{color:#1A2B3C;font-weight:600}
.meta-box span{color:#2E7FB8}
.section-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:14px}
.tl-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.tl-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.tl-icon.done{background:#28A745;color:#fff}
.tl-icon.current{background:#F47920;color:#fff}
.tl-icon.pending{background:#e9ecef;color:#aaa;border:2px solid #dee2e6}
.tl-line{width:2px;flex:1;min-height:24px;margin:2px 0}
.tl-line.done{background:#28A745}
.tl-line.pending{background:#dee2e6}
.tl-content{padding-top:5px;padding-bottom:18px;flex:1}
.tl-label{font-size:13px;font-weight:700}
.tl-label.done{color:#28A745}
.tl-label.current{color:#F47920}
.tl-label.pending{color:#bbb}
.tl-time{font-size:11px;color:#888;margin-top:3px}
.fase-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;margin-bottom:18px}
.card-footer{background:#f8f9fa;padding:14px 24px;text-align:center;font-size:12px;color:#aaa;border-top:1px solid #eee}
.not-found{text-align:center;padding:32px 16px}
.not-found i{font-size:44px;color:#ddd;margin-bottom:16px;display:block}
.not-found h3{font-size:15px;color:#555;margin-bottom:8px}
.not-found p{font-size:13px;color:#888;line-height:1.7}
.wa-note{display:flex;align-items:flex-start;gap:10px;background:#e8f8ed;border-radius:8px;padding:12px 14px;font-size:12px;color:#155724;margin-top:20px;line-height:1.6}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.5s ease-in-out infinite}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">h</div>
    <div class="header-info">
      <h1>Acompanhamento Cirúrgico</h1>
      <p>Hospital Adventista de Belém</p>
    </div>
  </div>
  <div class="card-body" id="cardBody">
    <div style="text-align:center;padding:40px 20px">
      <i class="fa fa-circle-notch fa-spin" style="font-size:32px;color:#2E7FB8;margin-bottom:12px;display:block"></i>
      <p style="color:#888;font-size:13px">Carregando informações...</p>
    </div>
  </div>
  <div class="card-footer">Sistema Neoh &mdash; Hospital Adventista de Belém · HML</div>
</div>

<script>
const FASES=['SOLICITADO','EM CONFERÊNCIA','REVISADO','AGENDADO','PRÉ-AGENDADO','REVISÃO AGENDAMENTO','EM COTAÇÃO','MATERIAL AUTORIZADO','AGUARDANDO OPERADORA','AUTORIZADO','LIBERADO','VALIDAÇÃO MÉDICA','AUT. PARCIALMENTE','NEGADO','EM NEGOCIAÇÃO PARTICULAR','NEGOCIAÇÃO PARTICULAR APROVADA','AUTORIZADO PARTICULAR','SOL. AGENDAMENTO MÉDICO','REALIZADO','CANCELADO'];
const CORES={'SOLICITADO':'#2E7FB8','EM CONFERÊNCIA':'#F47920','REVISADO':'#9B59B6','AGENDADO':'#28A745','PRÉ-AGENDADO':'#17A2B8','EM COTAÇÃO':'#8B4513','AUTORIZADO':'#155724','LIBERADO':'#6610F2','NEGADO':'#222','REALIZADO':'#28A745','CANCELADO':'#DC3545'};

function cor(f){return CORES[f]||'#2E7FB8';}

function renderPedido(pac,cir,fase,dt,proto,fasesArr){
  const done=fasesArr.map(f=>f.fase);
  // Mostrar APENAS fases que já ocorreram + fase atual
  const showFases=fasesArr.map(f=>f.fase);
  // Garantir que a fase atual está incluída (pode não estar em fasesArr se vier via URL curta)
  if(!showFases.includes(fase)) showFases.push(fase);
  let tl='';
  showFases.forEach((f,i)=>{
    const isDone=f!==fase;
    const isCur=f===fase;
    const cls=isDone?'done':'current';
    const icon=isDone?'<i class="fa fa-check"></i>':'<i class="fa fa-circle pulse" style="font-size:10px"></i>';
    const fi=fasesArr.find(x=>x.fase===f);
    const isLast=i===showFases.length-1;
    tl+=`<div class="tl-item">
      <div class="tl-left">
        <div class="tl-icon ${cls}">${icon}</div>
        ${!isLast?`<div class="tl-line ${isDone?'done':'pending'}"></div>`:''}
      </div>
      <div class="tl-content">
        <div class="tl-label ${cls}">${f}</div>
        ${fi?`<div class="tl-time"><i class="fa fa-clock" style="font-size:10px"></i> ${fi.dt}</div>`:''}
      </div>
    </div>`;
  });

  document.getElementById('cardBody').innerHTML=`
    <div class="meta-box">
      <div><strong>Paciente:</strong> <span>${pac}</span></div>
      <div><strong>Cirurgia:</strong> <span>${cir}</span></div>
      <div><strong>Médico(a):</strong> <span>BARBARA GONCALVES RODRIGUES</span></div>
      <div><strong>Data prevista:</strong> <span>${dt||'—'}</span></div>
      <div><strong>Protocolo:</strong> <span>#${proto}</span></div>
    </div>
    <span class="fase-badge" style="background:${cor(fase)}">
      <i class="fa fa-circle" style="font-size:8px"></i> Status atual: ${fase}
    </span>
    <div class="section-title">Histórico do pedido</div>
    <div class="timeline">${tl}</div>
    <div class="wa-note">
      <i class="fab fa-whatsapp" style="font-size:20px;color:#25D366;flex-shrink:0"></i>
      <span>Você receberá atualizações automáticas por WhatsApp sempre que o status do seu pedido for alterado.</span>
    </div>`;
}

function init(){
  // Capturar id de múltiplas fontes
  const search = window.location.search || window.location.hash.replace('#','?');
  const p = new URLSearchParams(search);
  const id = p.get('id') || p.get('rastreio') || new URLSearchParams(document.location.search).get('id');

  if(!id){
    // Tentar extrair da URL manualmente como último recurso
    const urlStr = window.location.href;
    const matchId = urlStr.match(/[?&]id=([^&]+)/);
    const matchR  = urlStr.match(/[?&]rastreio=([^&]+)/);
    const fallbackId = matchId ? matchId[1] : (matchR ? matchR[1] : null);
    if(!fallbackId){
      document.getElementById('cardBody').innerHTML='<div class="not-found"><i class="fa fa-link-slash"></i><h3>Link inválido</h3><p>Este link não contém um código de rastreio válido.<br>Verifique a mensagem recebida no WhatsApp.</p></div>';
      return;
    }
    // Usar o fallbackId e continuar
    return initWithId(fallbackId);
  }
  initWithId(id);
}

function initWithId(id){
  const p = new URLSearchParams(window.location.search);

  // 1) Dados embutidos na URL (formato antigo longo)
  const pac=p.get('pac');
  const cir=p.get('cir');
  const fase=p.get('fase');
  const dt=p.get('dt');
  const proto=p.get('id') || id;
  let fasesArr=[];
  try{ fasesArr=JSON.parse(p.get('fases')||'[]'); }catch(e){ fasesArr=fase?[{fase:fase,dt:new Date().toLocaleString('pt-BR')}]:[]; }

  if(pac && cir && fase){
    renderPedido(pac,cir,fase,dt,proto,fasesArr);
    return;
  }

  // 2) localStorage (mesmo dispositivo/navegador)
  let pedidos=[];
  try{
    const raw=localStorage.getItem('neoh_pedidos2')||localStorage.getItem('neoh_pedidos');
    if(raw) pedidos=JSON.parse(raw);
  }catch(e){}

  const pedido=pedidos.find(pd=>pd.trackId===id || pd.id===id);
  if(pedido){
    renderPedido(pedido.paciente,pedido.cirurgia,pedido.fase,pedido.dtPrevista,pedido.id,pedido.fases||[]);
    return;
  }

  // 3) Pedido válido mas não disponível neste dispositivo
  document.getElementById('cardBody').innerHTML=`
    <div style="text-align:center;padding:24px 16px">
      <i class="fa fa-clock" style="font-size:44px;color:#2E7FB8;margin-bottom:16px;display:block"></i>
      <h3 style="font-size:15px;color:#1A2B3C;margin-bottom:8px;font-weight:700">Pedido em processamento</h3>
      <p style="font-size:13px;color:#888;line-height:1.7;margin-bottom:16px">
        Protocolo: <strong style="color:#2E7FB8">#${id}</strong><br>
        Seu pedido cirúrgico está sendo processado.<br>
        Você receberá atualizações via WhatsApp a cada mudança de status.
      </p>
      <div style="background:#EAF3FD;border-radius:8px;padding:14px;font-size:13px;color:#555;text-align:left">
        <div style="font-weight:700;margin-bottom:6px;color:#1A2B3C">
          <span style="background:#2E7FB8;color:#fff;border-radius:12px;padding:2px 10px;font-size:11px">SOLICITADO</span>
        </div>
        <div style="margin-top:6px">Hospital Adventista de Belém — Sistema Neoh</div>
      </div>
      <div class="wa-note" style="margin-top:16px">
        <i class="fab fa-whatsapp" style="font-size:20px;color:#25D366;flex-shrink:0"></i>
        <span>Atualizações automáticas serão enviadas para o seu WhatsApp.</span>
      </div>
    </div>`;
}

window.addEventListener('load',()=>setTimeout(init,300));
</script>
</body>
</html>
