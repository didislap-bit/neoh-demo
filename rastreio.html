<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreio Cirúrgico — Hospital Adventista de Belém</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1A2B3C 0%,#2E7FB8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.card-header{background:#2E7FB8;padding:20px 24px;display:flex;align-items:center;gap:14px}
.logo{width:44px;height:44px;background:#F47920;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#fff;flex-shrink:0}
.header-info{color:#fff}
.header-info h1{font-size:16px;font-weight:700;margin-bottom:2px}
.header-info p{font-size:12px;opacity:.8}
.card-body{padding:24px}
.meta-box{background:#EAF3FD;border-radius:10px;padding:16px;margin-bottom:20px;font-size:13px;line-height:2}
.meta-box strong{color:#1A2B3C;font-weight:600}
.meta-box span{color:#2E7FB8}
.section-title{font-size:13px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:14px;padding-bottom:4px}
.tl-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.tl-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;z-index:1}
.tl-icon.done{background:#28A745;color:#fff}
.tl-icon.current{background:#F47920;color:#fff}
.tl-icon.pending{background:#e9ecef;color:#aaa;border:2px solid #dee2e6}
.tl-line{width:2px;flex:1;min-height:20px;background:#dee2e6;margin:2px 0}
.tl-line.done{background:#28A745}
.tl-content{padding-top:5px;padding-bottom:16px;flex:1}
.tl-label{font-size:13px;font-weight:700}
.tl-label.done{color:#28A745}
.tl-label.current{color:#F47920}
.tl-label.pending{color:#aaa}
.tl-time{font-size:11px;color:#888;margin-top:2px}
.badge-fase{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;margin-bottom:16px}
.card-footer{background:#f8f9fa;padding:14px 24px;text-align:center;font-size:12px;color:#888;border-top:1px solid #eee}
.card-footer a{color:#2E7FB8;text-decoration:none;font-weight:600}
.not-found{text-align:center;padding:30px 20px}
.not-found i{font-size:48px;color:#dee2e6;margin-bottom:16px;display:block}
.not-found h3{font-size:16px;color:#555;margin-bottom:8px}
.not-found p{font-size:13px;color:#888;line-height:1.6}
.pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading{text-align:center;padding:40px 20px}
.loading i{font-size:32px;color:#2E7FB8;margin-bottom:12px;display:block}
.wa-note{display:flex;align-items:center;gap:8px;background:#e8f8ed;border-radius:8px;padding:12px 14px;font-size:12px;color:#155724;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">h</div>
    <div class="header-info">
      <h1>Acompanhamento Cirúrgico</h1>
      <p>Hospital Adventista de Belém</p>
    </div>
  </div>

  <div class="card-body" id="cardBody">
    <div class="loading">
      <i class="fa fa-circle-notch fa-spin"></i>
      <p style="color:#888;font-size:13px">Carregando informações...</p>
    </div>
  </div>

  <div class="card-footer">
    Sistema Neoh · <a href="https://didislap-bit.github.io/neoh-demo/" target="_blank">Hospital Adventista de Belém</a>
  </div>
</div>

<script>
const FASES = [
  'SOLICITADO','EM CONFERÊNCIA','REVISADO','AGENDADO','PRÉ-AGENDADO',
  'REVISÃO AGENDAMENTO','EM COTAÇÃO','MATERIAL AUTORIZADO','AGUARDANDO OPERADORA',
  'AUTORIZADO','LIBERADO','VALIDAÇÃO MÉDICA','AUT. PARCIALMENTE','NEGADO',
  'EM NEGOCIAÇÃO PARTICULAR','NEGOCIAÇÃO PARTICULAR APROVADA','AUTORIZADO PARTICULAR',
  'SOL. AGENDAMENTO MÉDICO','REALIZADO','CANCELADO'
];

const FASE_COLORS = {
  'SOLICITADO':'#2E7FB8','EM CONFERÊNCIA':'#F47920','REVISADO':'#9B59B6',
  'AGENDADO':'#28A745','PRÉ-AGENDADO':'#17A2B8','EM COTAÇÃO':'#8B4513',
  'AUTORIZADO':'#155724','LIBERADO':'#6610F2','NEGADO':'#000',
  'REALIZADO':'#28A745','CANCELADO':'#DC3545'
};

function getFaseColor(fase){ return FASE_COLORS[fase]||'#2E7FB8'; }

function renderNotFound(trackId){
  document.getElementById('cardBody').innerHTML = `
    <div class="not-found">
      <i class="fa fa-search"></i>
      <h3>Pedido não encontrado</h3>
      <p>Não foi possível localizar o pedido com o código <strong>${trackId}</strong>.<br>
      Verifique o link recebido ou entre em contato com o hospital.</p>
    </div>`;
}

function renderRastreio(pedido){
  const faseColor = getFaseColor(pedido.fase);
  const done = pedido.fases.map(f => f.fase);
  const currentIdx = FASES.indexOf(pedido.fase);
  const showFases = FASES.slice(0, Math.min(currentIdx + 3, FASES.length));

  let timelineHTML = '';
  showFases.forEach((fase, i) => {
    const isDone = done.includes(fase) && fase !== pedido.fase;
    const isCurrent = fase === pedido.fase;
    const isPending = !isDone && !isCurrent;
    const fInfo = pedido.fases.find(x => x.fase === fase);
    const isLast = i === showFases.length - 1;
    const cls = isDone ? 'done' : isCurrent ? 'current' : 'pending';
    const icon = isDone
      ? '<i class="fa fa-check"></i>'
      : isCurrent
        ? '<i class="fa fa-circle pulse"></i>'
        : '<i class="fa fa-circle" style="font-size:8px"></i>';

    timelineHTML += `
      <div class="tl-item">
        <div class="tl-left">
          <div class="tl-icon ${cls}">${icon}</div>
          ${!isLast ? `<div class="tl-line ${isDone ? 'done' : ''}"></div>` : ''}
        </div>
        <div class="tl-content">
          <div class="tl-label ${cls}">${fase}</div>
          ${fInfo ? `<div class="tl-time"><i class="fa fa-clock" style="font-size:10px"></i> ${fInfo.dt}</div>` : ''}
        </div>
      </div>`;
  });

  document.getElementById('cardBody').innerHTML = `
    <div class="meta-box">
      <div><strong>Paciente:</strong> <span>${pedido.paciente}</span></div>
      <div><strong>Cirurgia:</strong> <span>${pedido.cirurgia}</span></div>
      <div><strong>Médico(a):</strong> <span>BARBARA GONCALVES RODRIGUES</span></div>
      <div><strong>Data prevista:</strong> <span>${pedido.dtPrevista || '—'}</span></div>
      <div><strong>Protocolo:</strong> <span>#${pedido.id}</span></div>
    </div>

    <div style="margin-bottom:6px">
      <span class="badge-fase" style="background:${faseColor}">
        <i class="fa fa-circle" style="font-size:8px"></i>
        Status atual: ${pedido.fase}
      </span>
    </div>

    <div class="section-title">Histórico do pedido</div>
    <div class="timeline">${timelineHTML}</div>

    <div class="wa-note">
      <i class="fab fa-whatsapp" style="font-size:18px;color:#25D366"></i>
      <span>Você receberá atualizações automáticas por WhatsApp a cada mudança de fase.</span>
    </div>`;
}

// Ler pedidos do localStorage (compartilhado com o sistema principal no mesmo domínio)
function loadAndRender(){
  const params = new URLSearchParams(window.location.search);
  const rastreioId = params.get('rastreio');

  if(!rastreioId){
    document.getElementById('cardBody').innerHTML = `
      <div class="not-found">
        <i class="fa fa-link-slash"></i>
        <h3>Link inválido</h3>
        <p>Este link não contém um código de rastreio válido.<br>
        Verifique a mensagem recebida no WhatsApp.</p>
      </div>`;
    return;
  }

  // Buscar no localStorage (mesmo domínio do sistema)
  let pedidos = [];
  try {
    const stored = localStorage.getItem('neoh_pedidos2') || localStorage.getItem('neoh_pedidos');
    if(stored) pedidos = JSON.parse(stored);
  } catch(e){}

  const pedido = pedidos.find(p => p.trackId === rastreioId);

  if(pedido){
    renderRastreio(pedido);
  } else {
    // Pedido não está no localStorage local - mostrar tela de não encontrado
    // com info básica do protocolo
    renderNotFound(rastreioId);
  }
}

// Executar ao carregar
window.addEventListener('load', () => {
  setTimeout(loadAndRender, 600);
});
</script>
</body>
</html>
